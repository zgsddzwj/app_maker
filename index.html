<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store 截图生成器</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>截图生成器</span>
                </div>
            </div>

            <!-- 设备选择 -->
            <div class="sidebar-section">
                <h3 class="section-title">设备尺寸</h3>
                <div class="device-options">
                    <button class="device-btn active" data-device="iphone67">
                        <span class="device-name">iPhone 6.7"</span>
                        <span class="device-size">1290 x 2796</span>
                    </button>
                    <button class="device-btn" data-device="iphone65">
                        <span class="device-name">iPhone 6.5"</span>
                        <span class="device-size">1242 x 2688</span>
                    </button>
                    <button class="device-btn" data-device="iphone55">
                        <span class="device-name">iPhone 5.5"</span>
                        <span class="device-size">1242 x 2208</span>
                    </button>
                    <button class="device-btn" data-device="ipad13">
                        <span class="device-name">iPad 13"</span>
                        <span class="device-size">2048 x 2732</span>
                    </button>
                    <button class="device-btn" data-device="ipad11">
                        <span class="device-name">iPad 11"</span>
                        <span class="device-size">1668 x 2388</span>
                    </button>
                </div>
            </div>

            <!-- 截图上传 -->
            <div class="sidebar-section">
                <h3 class="section-title">App 截图</h3>
                <div class="upload-area" id="screenshotUpload">
                    <input type="file" id="screenshotInput" accept="image/*" hidden>
                    <div class="upload-content">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                            <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M17 8L12 3L7 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <p>点击或拖拽上传截图</p>
                        <span>支持 PNG、JPG 格式</span>
                    </div>
                </div>
                <div class="screenshot-preview" id="screenshotPreview" style="display: none;">
                    <img id="screenshotImage" src="" alt="截图预览">
                    <button class="remove-btn" id="removeScreenshot">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 文字内容 -->
            <div class="sidebar-section">
                <h3 class="section-title">宣传文字</h3>
                <div class="text-inputs">
                    <div class="input-group">
                        <label>标题</label>
                        <input type="text" id="titleInput" placeholder="输入标题文字" maxlength="50">
                    </div>
                    <div class="input-group">
                        <label>副标题</label>
                        <input type="text" id="subtitleInput" placeholder="输入副标题文字" maxlength="100">
                    </div>
                </div>
            </div>

            <!-- 样式设置 -->
            <div class="sidebar-section">
                <h3 class="section-title">样式设置</h3>
                
                <!-- 背景设置 -->
                <div class="style-group">
                    <label class="style-label">背景类型</label>
                    <div class="bg-type-selector">
                        <button class="bg-type-btn active" data-type="gradient">渐变</button>
                        <button class="bg-type-btn" data-type="solid">纯色</button>
                        <button class="bg-type-btn" data-type="image">图片</button>
                    </div>
                </div>

                <div class="style-group" id="gradientSettings">
                    <label class="style-label">渐变颜色</label>
                    <div class="color-pickers">
                        <div class="color-picker">
                            <input type="color" id="gradientColor1" value="#667eea">
                            <span>起始色</span>
                        </div>
                        <div class="color-picker">
                            <input type="color" id="gradientColor2" value="#764ba2">
                            <span>结束色</span>
                        </div>
                    </div>
                    <div class="gradient-presets">
                        <button class="preset-btn" data-colors="#667eea,#764ba2" style="background: linear-gradient(135deg, #667eea, #764ba2)"></button>
                        <button class="preset-btn" data-colors="#f093fb,#f5576c" style="background: linear-gradient(135deg, #f093fb, #f5576c)"></button>
                        <button class="preset-btn" data-colors="#4facfe,#00f2fe" style="background: linear-gradient(135deg, #4facfe, #00f2fe)"></button>
                        <button class="preset-btn" data-colors="#43e97b,#38f9d7" style="background: linear-gradient(135deg, #43e97b, #38f9d7)"></button>
                        <button class="preset-btn" data-colors="#fa709a,#fee140" style="background: linear-gradient(135deg, #fa709a, #fee140)"></button>
                        <button class="preset-btn" data-colors="#a18cd1,#fbc2eb" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb)"></button>
                        <button class="preset-btn" data-colors="#ff0844,#ffb199" style="background: linear-gradient(135deg, #ff0844, #ffb199)"></button>
                        <button class="preset-btn" data-colors="#0c1db8,#60a0ff" style="background: linear-gradient(135deg, #0c1db8, #60a0ff)"></button>
                    </div>
                </div>

                <div class="style-group" id="solidSettings" style="display: none;">
                    <label class="style-label">背景颜色</label>
                    <div class="color-picker">
                        <input type="color" id="solidColor" value="#1a1a2e">
                    </div>
                </div>

                <div class="style-group" id="imageSettings" style="display: none;">
                    <label class="style-label">背景图片</label>
                    <div class="upload-area upload-area-sm" id="bgImageUpload">
                        <input type="file" id="bgImageInput" accept="image/*" hidden>
                        <span>上传背景图片</span>
                    </div>
                    <div class="bg-preview" id="bgPreview" style="display: none;">
                        <img id="bgImage" src="" alt="背景预览">
                        <button class="remove-btn" id="removeBgImage">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- 文字样式 -->
                <div class="style-group">
                    <label class="style-label">标题颜色</label>
                    <div class="color-picker">
                        <input type="color" id="titleColor" value="#ffffff">
                    </div>
                </div>

                <div class="style-group">
                    <label class="style-label">副标题颜色</label>
                    <div class="color-picker">
                        <input type="color" id="subtitleColor" value="#e0e0e0">
                    </div>
                </div>

                <div class="style-group">
                    <label class="style-label">标题字号</label>
                    <div class="slider-container">
                        <input type="range" id="titleFontSize" min="40" max="120" value="72">
                        <span id="titleFontSizeValue">72px</span>
                    </div>
                </div>

                <div class="style-group">
                    <label class="style-label">副标题字号</label>
                    <div class="slider-container">
                        <input type="range" id="subtitleFontSize" min="20" max="60" value="36">
                        <span id="subtitleFontSizeValue">36px</span>
                    </div>
                </div>

                <div class="style-group">
                    <label class="style-label">文字位置</label>
                    <div class="position-selector">
                        <button class="position-btn active" data-position="top">上方</button>
                        <button class="position-btn" data-position="center">居中</button>
                        <button class="position-btn" data-position="bottom">下方</button>
                    </div>
                </div>

                <!-- 手机框架 -->
                <div class="style-group">
                    <label class="style-label">手机框架</label>
                    <div class="toggle-container">
                        <label class="toggle">
                            <input type="checkbox" id="showFrame" checked>
                            <span class="toggle-slider"></span>
                        </label>
                        <span>显示设备边框</span>
                    </div>
                </div>

                <div class="style-group">
                    <label class="style-label">框架颜色</label>
                    <div class="color-picker">
                        <input type="color" id="frameColor" value="#1a1a1a">
                    </div>
                </div>
            </div>

            <!-- 导出按钮 -->
            <div class="sidebar-section">
                <button class="export-btn" id="exportBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    导出截图
                </button>
            </div>
        </aside>

        <!-- 主内容区 - 预览 -->
        <main class="main-content">
            <div class="preview-container">
                <div class="preview-header">
                    <h2>实时预览</h2>
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOut">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                                <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M8 11H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                        <span id="zoomLevel">50%</span>
                        <button class="zoom-btn" id="zoomIn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                                <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <path d="M11 8V14M8 11H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="preview-wrapper">
                    <div class="preview-canvas" id="previewCanvas">
                        <!-- 动态生成的预览内容 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 隐藏的Canvas用于导出 -->
    <canvas id="exportCanvas" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
